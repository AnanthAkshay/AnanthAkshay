name: Update Contribution Stats
on:
  schedule:
    - cron: '0 0 * * *'   # runs daily at midnight UTC
  workflow_dispatch:        # lets you trigger manually too
  push:
    branches: [main]

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate SVG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 generate_stats.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add contribution-stats.svg
          git diff --staged --quiet || (git commit -m "📊 update stats [skip ci]" && git push)
